name: H-News Backend CI

on:
  push:
  pull_request:

jobs:
  backend-ci:
    name: Backend Install, Test and Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Check backend JavaScript syntax
        working-directory: backend
        run: |
          node --check src/server.js
          node --check src/app.js
          node --check src/controllers/newsController.js
          node --check src/controllers/favoriteController.js
          node --check src/controllers/offlineController.js
          node --check src/services/newsService.js
          node --check src/services/cacheService.js
          node --check src/queue/rabbitmq.js

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build backend Docker image
        run: docker build -t h-news-backend ./backend
